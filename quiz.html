<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HJ Trial Quiz — Подберём тебе программу</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #252525;
    --border: #333;
    --text: #f0f0f0;
    --text-muted: #888;
    --accent: #7B3DFF;
    --accent-glow: rgba(123, 61, 255, 0.15);
    --green: #22c55e;
    --blue: #3b82f6;
    --purple: #9D6FFF;
    --yellow: #eab308;
    --red: #ef4444;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 1px;
  }
  .header-logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; }
  .btn-small {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-small:hover { border-color: var(--accent); color: var(--text); }
  .btn-small.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  /* Layout */
  .layout { display: flex; min-height: calc(100vh - 57px); }
  .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
  .debug-panel {
    width: 380px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    padding: 24px;
    overflow-y: auto;
    display: none;
    max-height: calc(100vh - 57px);
  }
  .debug-panel.visible { display: block; }

  /* Progress */
  .progress-wrap { width: 100%; max-width: 520px; margin-bottom: 32px; }
  .progress-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* Quiz Card */
  .quiz-card {
    width: 100%;
    max-width: 520px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .quiz-question {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 24px;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 12px; }
  .quiz-option {
    padding: 16px 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
  }
  .quiz-option:hover { border-color: var(--accent); background: var(--accent-glow); }
  .quiz-option.selected { border-color: var(--accent); background: var(--accent-glow); }

  /* Navigation */
  .quiz-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 24px;
    max-width: 520px;
    width: 100%;
  }
  .btn-back {
    padding: 10px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-back:hover { color: var(--text); border-color: var(--text-muted); }
  .btn-back.hidden { visibility: hidden; }

  /* Result */
  .result-card {
    width: 100%;
    max-width: 560px;
    animation: fadeIn 0.4s ease;
  }
  .result-header { text-align: center; margin-bottom: 32px; }
  .result-header h2 { font-size: 16px; color: var(--text-muted); font-weight: 400; margin-bottom: 8px; }
  .result-basis {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .result-duration {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--accent);
  }
  .result-program-sub {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .result-tagline { color: var(--text-muted); font-size: 15px; }
  .result-price {
    text-align: center;
    padding: 20px;
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .result-price-amount {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
  }
  .result-price-detail {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .result-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .result-section h3 {
    font-size: 14px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .result-section ul { list-style: none; }
  .result-section li {
    padding: 6px 0;
    padding-left: 20px;
    position: relative;
    font-size: 15px;
  }
  .result-section li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 13px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }
  .result-modifier {
    background: var(--accent-glow);
    border: 1px solid rgba(255, 107, 53, 0.3);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 12px;
    font-size: 14px;
    line-height: 1.5;
  }
  .result-cta {
    display: block;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 24px;
    transition: opacity 0.2s;
  }
  .result-cta:hover { background: #5A1FD6; }
  .btn-restart {
    display: block;
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .btn-restart:hover { color: var(--text); border-color: var(--text-muted); }

  /* Alt programs */
  .alt-programs { margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
  .alt-programs-title { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; text-align: center; }
  .alt-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.2s; }
  .alt-card:hover { border-color: var(--accent); }
  .alt-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .alt-card-name { font-weight: 600; font-size: 16px; }
  .alt-card-price { color: var(--accent); font-weight: 600; }
  .alt-card-details { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
  .alt-card-diff { font-size: 13px; color: var(--text); }
  .alt-card-toggle { font-size: 13px; color: var(--accent); margin-top: 10px; text-align: center; }
  .alt-card.expanded .alt-card-toggle { display: none; }
  .alt-card-expand { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .alt-card.expanded .alt-card-expand { max-height: 500px; }
  .alt-tl { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .alt-tl-step { display: flex; gap: 10px; font-size: 13px; }
  .alt-tl-label { color: var(--accent); font-weight: 600; white-space: nowrap; min-width: 90px; }
  .alt-tl-text { color: var(--text-muted); }
  .alt-features { margin: 14px 0; padding-left: 18px; font-size: 13px; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px; }
  .alt-card-cta { display: block; width: 100%; padding: 12px; border: 1px solid var(--accent); border-radius: var(--radius); background: transparent; color: var(--accent); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .alt-card-cta:hover { background: var(--accent); color: white; }

  /* AI mode */
  .ai-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .ai-toggle:hover { border-color: var(--accent); }
  .ai-toggle.active { border-color: var(--green); color: var(--green); background: rgba(34, 197, 94, 0.1); }
  .ai-toggle .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); transition: background 0.2s; }
  .ai-toggle.active .dot { background: var(--green); box-shadow: 0 0 6px rgba(34, 197, 94, 0.5); }
  .ai-config {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 8px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 320px;
    z-index: 200;
    display: none;
  }
  .ai-config.visible { display: block; }
  .ai-config label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 6px; }
  .ai-config input {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: monospace;
  }
  .ai-config input:focus { outline: none; border-color: var(--accent); }
  .ai-config .hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  /* Body input (height/weight) */
  /* Assessment blocks */
  .assessment-blocks { display: flex; gap: 12px; }
  .assessment-block { flex: 1; background: var(--surface2); border-radius: var(--radius); padding: 14px; }
  .assessment-block-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
  .assessment-block-text { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

  /* Club selection */
  .club-city-group { margin-bottom: 20px; }
  .club-city-label { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .club-option { cursor: pointer; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); transition: all 0.2s; }
  .club-option:hover { border-color: var(--accent); }
  .club-option.selected { border-color: var(--accent); background: var(--accent-glow); }
  .club-name { font-weight: 600; font-size: 15px; }
  .club-address { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  .body-inputs { display: flex; gap: 16px; margin-bottom: 20px; }
  .body-field { flex: 1; }
  .body-field label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .body-field .input-wrap {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0 14px;
    transition: border-color 0.2s;
  }
  .body-field .input-wrap:focus-within { border-color: var(--accent); }
  .body-field input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 24px;
    font-weight: 600;
    padding: 14px 0;
    width: 100%;
    outline: none;
    -moz-appearance: textfield;
  }
  .body-field input::-webkit-outer-spin-button,
  .body-field input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .body-field .suffix { color: var(--text-muted); font-size: 15px; margin-left: 4px; }

  .ai-fallback {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    margin-bottom: 16px;
  }
  .ai-fallback p { color: var(--text-muted); font-size: 14px; margin-bottom: 12px; }
  .ai-fallback button {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: var(--accent-glow);
    color: var(--accent);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ai-fallback button:hover { background: var(--accent); color: white; }
  .ai-loading {
    color: var(--text-muted);
    font-size: 14px;
    font-style: italic;
  }
  .ai-loading::after {
    content: '';
    animation: dots 1.5s steps(4) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }
  @media (max-width: 768px) {
    .ai-config { width: calc(100vw - 48px); right: -60px; }
  }

  /* Debug Panel */
  .debug-title {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .debug-section { margin-bottom: 20px; }
  .debug-section h4 { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .debug-score {
    display: flex;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 14px;
  }
  .debug-score .label { color: var(--text-muted); }
  .debug-score .value { font-weight: 600; }

  .debug-matrix { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  .debug-matrix th, .debug-matrix td {
    padding: 8px 6px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .debug-matrix th { background: var(--surface2); color: var(--text-muted); font-weight: 500; }
  .debug-matrix td { background: var(--surface); }
  .debug-matrix td.highlight {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  .debug-answers { margin-top: 12px; }
  .debug-answer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .debug-answer .q { color: var(--text-muted); }
  .debug-answer select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 4px 8px;
    font-size: 12px;
  }

  .debug-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-fs { background: rgba(34, 197, 94, 0.15); color: var(--green); }
  .tag-bc { background: rgba(59, 130, 246, 0.15); color: var(--blue); }
  .tag-hw { background: rgba(168, 85, 247, 0.15); color: var(--purple); }

  .debug-modifier-info {
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 13px;
    margin-top: 8px;
  }
  .debug-modifier-info .before { color: var(--text-muted); text-decoration: line-through; }
  .debug-modifier-info .after { color: var(--accent); font-weight: 600; }
  .debug-modifier-info .arrow { color: var(--text-muted); margin: 0 6px; }
  .debug-modifier-info.no-change { color: var(--text-muted); }

  /* Scenarios tab */
  .scenarios-panel {
    width: 100%;
    max-width: 900px;
    padding: 24px;
    display: none;
  }
  .scenarios-panel.visible { display: block; }
  .scenarios-filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  .scenarios-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .scenarios-table th, .scenarios-table td {
    padding: 8px 10px;
    text-align: left;
    border: 1px solid var(--border);
  }
  .scenarios-table th {
    background: var(--surface);
    color: var(--text-muted);
    font-weight: 500;
    position: sticky;
    top: 56px;
  }
  .scenarios-table tr:hover td { background: var(--surface2); }
  .scenarios-table td { background: var(--surface); }
  .scenarios-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-card {
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
  }
  .stat-card .stat-value { font-size: 24px; font-weight: 700; }

  /* Fear tags */
  .fear-chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  .fear-chip {
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .fear-chip:hover { border-color: var(--accent); }
  .fear-chip.selected { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }
  .fear-custom-input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    margin-bottom: 16px;
    resize: none;
    height: 48px;
    font-family: inherit;
  }
  .fear-custom-input::placeholder { color: var(--text-muted); }
  .fear-custom-input:focus { outline: none; border-color: var(--accent); }
  .btn-continue {
    padding: 14px 32px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-continue:hover { opacity: 0.9; }
  .btn-skip {
    padding: 10px 20px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .btn-skip:hover { color: var(--text); }

  .fear-answer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
  }
  .fear-answer .fear-q {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .fear-answer .fear-a {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }

  /* Icons in options */
  .quiz-option-icon {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .quiz-option-icon .opt-icon {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: var(--surface2);
    font-size: 18px;
  }
  .quiz-option.selected .opt-icon { background: var(--accent-glow); }

  /* Interstitial screens */
  .interstitial {
    width: 100%;
    max-width: 520px;
    text-align: center;
    animation: fadeIn 0.4s ease;
  }
  .interstitial-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent-glow);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin: 0 auto 20px;
  }
  .interstitial-text {
    font-size: 20px;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .interstitial-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .btn-interstitial {
    padding: 14px 40px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-interstitial:hover { background: #5A1FD6; }

  /* Prediction screen */
  .prediction {
    width: 100%;
    max-width: 520px;
    animation: fadeIn 0.4s ease;
  }
  .prediction-title {
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 24px;
  }
  .prediction-timeline {
    position: relative;

function getActivityDetailsPrompt(ans) {
  const details = ans.q2details || [];
  const custom = ans.q2detailscustom || '';
  if (details.length === 0 && !custom) return '';
  const parts = details.map(k => activityDetailLabels[k]).filter(Boolean);
  if (custom) parts.push(custom);
  return '\n- Предыдущий/текущий опыт: ' + parts.join(', ');
}

// BMI calculation (hidden from user)
function calcBMI(ans) {
  if (!ans.qHeight || !ans.qWeight) return null;
  const h = ans.qHeight / 100;
  return Math.round(ans.qWeight / (h * h) * 10) / 10;
}

function getBmiCategory(bmi) {
  if (bmi === null) return null;
  if (bmi < 18.5) return 'underweight';
  if (bmi < 25) return 'normal';
  if (bmi < 30) return 'overweight';
  return 'obese';
}

function getBmiLabel(bmi) {
  if (bmi === null) return 'не указано';
  const cat = getBmiCategory(bmi);
  const labels = { underweight: 'дефицит веса', normal: 'норма', overweight: 'избыточный вес', obese: 'ожирение' };
  return `${bmi} (${labels[cat]})`;
}

// BMI modifier — soft nudge toward longer programs
function applyBmiModifier(program, bmi, goal) {
  if (bmi === null) return program;
  if (bmi >= 35) {
    // Very high BMI — Первый Шаг regardless (gentle start critical)
    if (program === 'heros-week' || program === 'basecamp') return 'first-step';
  }
  if (bmi >= 30 && goal === 'A') {
    // High BMI + transformation goal — upgrade from short to medium
    if (program === 'heros-week') return 'basecamp';
  }
  return program;
}

// Interstitial content — dynamic based on answers, random fact from pool
function getInterstitialContent(id) {
  if (id === 'after-profile') {
    const a = answers.qAge || '25-34';
    const pool = profileFacts[a] || profileFacts['25-34'];
    const fact = pickRandom(pool);
    return { icon: profileIcons[a] || '🎯', text: fact.text, sub: fact.sub };
  }

  if (id === 'after-occupation') {
    const occ = answers.qOccupation;
    const pool = occupationFacts[occ];
    if (pool) {
      const fact = pickRandom(pool);
      const icons = { office: '💻', remote: '🏠', standing: '🏃', student: '📚', parent: '👶', physical: '🔧' };
      return { icon: icons[occ] || '💪', text: fact.text, sub: fact.sub };
    }
    return { icon: '💪', text: 'Осталось совсем немного', sub: 'Мы уже почти подобрали тебе программу' };
  }

  if (id === 'after-q2') {
    const q2 = answers.q2;
    const pool = experienceFacts[q2];
    if (pool) {
      const fact = pickRandom(pool);
      const icons = { A: '🎯', B: '🔄', C: '⚡', D: '🏋️' };
      return { icon: icons[q2] || '💪', text: fact.text, sub: fact.sub };
    }
    return { icon: '💪', text: 'Мы подбираем программу под тебя', sub: '' };
  }

  if (id === 'after-q4') {
    const risk = answers.q4;
    const pool = healthFacts[risk];
    if (pool) {
      const fact = pickRandom(pool);
      const icons = { A: '✅', B: '✅', C: '🛡️' };
      return { icon: icons[risk] || '✅', text: fact.text, sub: fact.sub };
    }
    return {
      icon: '✅',
      text: 'Отлично — осталось совсем немного',
      sub: 'Мы уже почти подобрали тебе программу'
    };
  }

  if (id === 'after-body') {
    const bmi = calcBMI(answers);
    const cat = bmi ? getBmiCategory(bmi) : 'skipped';
    const pool = bodyFacts[cat] || bodyFacts['skipped'];
    const fact = pickRandom(pool);
    const icons = { underweight: '🏗️', normal: '✅', overweight: '⚡', obese: '🛡️', skipped: '💪' };
    return { icon: icons[cat] || '💪', text: fact.text, sub: fact.sub };
  }

  return { icon: '💪', text: '', sub: '' };
}

// Personalized question text based on previous answers
function getPersonalizedQuestion(q) {
  if (q.id === 'q2details') {
    const phrases = { B: 'Чем ты занимался раньше?', C: 'Чем ты занимаешься сейчас?', D: 'Какие тренировки ты делаешь?' };
    return phrases[answers.q2] || q.question;
  }
  if (q.id === 'q4details') {
    return answers.q4 === 'C'
      ? 'Расскажи подробнее — что именно нужно учесть?'
      : 'Уточни, что именно беспокоит — тренер учтёт это';
  }
  if (q.id === 'qAge') {
    return 'Сколько тебе лет?';
  }
  if (q.id === 'q1') {
    const age = answers.qAge;
    if (age === '18-24') return 'Что для тебя сейчас важнее всего?';
    if (age === '45+') return 'Какая цель для тебя на первом месте?';
    return q.question;
  }
  if (q.id === 'q3') {
    const goalPhrases = {
      A: 'Ты хочешь привести тело в форму',
      B: 'Ты хочешь стать сильнее',
      C: 'Ты хочешь начать тренироваться регулярно',
      D: 'Ты хочешь попробовать'
    };
    const phrase = goalPhrases[answers.q1];
    return phrase ? `${phrase} — что важно для старта?` : q.question;
  }
  if (q.id === 'q5') {
    const expPhrases = {
      A: 'Для новичка нормально сомневаться',
      B: 'Возвращаться бывает непросто',
      C: 'Менять привычное — это смелый шаг',
      D: 'Зал — это новый формат для тебя'
    };
    const phrase = expPhrases[answers.q2];
    return phrase ? `${phrase}. Есть ли что-то, что тебя беспокоит?` : q.question;
  }
  return q.question;
}

// Prediction screen content
function getClubFormats(ans) {
  const club = ans.qClub ? clubInfo[ans.qClub] : null;
  const hasReshape = club ? club.hasReshape : true;
  const hasMetcon = club ? club.hasMetcon : true;
  const isVilla = ans.qClub === 'villa';
  const strengthLabel = isVilla ? 'силовая на всё тело (работа с весами на тренажёрах)' : 'силовые тренировки (работа с весами на тренажёрах)';
  const hiitLabel = hasMetcon ? 'жиросжигающее кардио (HIIT и Metcon — короткие интервалы с максимальной отдачей)' : 'жиросжигающее кардио (HIIT — короткие интервалы с максимальной отдачей)';
  const reshapeLabel = 'тренировки на гибкость и восстановление (Reshape — занятия на реформерах, похожи на пилатес)';
  const allFormats = hasReshape ? `${strengthLabel}, ${hiitLabel}, ${reshapeLabel}` : `${strengthLabel} и ${hiitLabel}`;
  return { hasReshape, hasMetcon, isVilla, strengthLabel, hiitLabel, reshapeLabel, allFormats };
}

    timeline.push({ label: 'День 2', text: `Жиросжигающее кардио (${fmt.hasMetcon ? 'Metcon' : 'Bootcamp'}) — короткие интервалы, проверишь выносливость` });
    timeline.push({ label: 'День 3', text: fmt.hasReshape ? 'Гибкость и восстановление на реформерах (Reshape) — похоже на пилатес, но с тренажёрами' : 'Ещё один формат — попробуешь и сравнишь' });
    timeline.push({ label: 'После недели', text: 'Ты знаешь, твоё это или нет — и решаешь сам', final: true });
  }

  return { program: info, rec, timeline, subtitle };
}

// ========== SCORING ==========
function calcFitnessLevel(ans) {
  if (!ans.q2) return null;
  return fitnessScores[ans.q2];
}

function calcMotivation(ans) {
  const vals = [];
  if (ans.q1) vals.push(motivationScores.q1[ans.q1]);
  if (ans.q3) vals.push(motivationScores.q3[ans.q3]);
  if (vals.length === 0) return null;
  return vals.reduce((a, b) => a + b, 0) / vals.length;
}

function getFitnessCategory(level) {
  if (level === null) return null;
  if (level <= 1) return 'beginner';
  if (level === 2) return 'active';
  return 'advanced';
}

function getMotivationCategory(score) {
  if (score === null) return null;
  if (score < 1) return 'low';
  if (score <= 1) return 'medium';
  return 'high';
}

function getRiskLevel(ans) {
  if (!ans.q4) return null;
  const map = { A: 'none', B: 'moderate', C: 'high' };
  return map[ans.q4];
}

function isSwitcher(ans) {
  return ans.q2 === 'C';
}

function applyRiskModifier(program, risk) {
  if (risk === 'high') return 'first-step';
  // moderate: тренер адаптирует нагрузку в рамках любой программы, не понижаем
  return program;
}

function getRecommendation(ans) {
  const fitness = calcFitnessLevel(ans);
  const motivation = calcMotivation(ans);
  const fitCat = getFitnessCategory(fitness);
  const motCat = getMotivationCategory(motivation);
  if (!fitCat || !motCat) return null;

  const baseProgram = routingMatrix[fitCat][motCat];
  const risk = getRiskLevel(ans);
  const afterRisk = applyRiskModifier(baseProgram, risk);
  const bmi = calcBMI(ans);
  const finalProgram = applyBmiModifier(afterRisk, bmi, ans.q1);
  const switcher = isSwitcher(ans);
  const bmiModified = afterRisk !== finalProgram;

  return { fitness, motivation, fitCat, motCat, risk, baseProgram, afterRisk, finalProgram, switcher, bmi, bmiModified };
}

function getAiText(ans) {
  const risk = getRiskLevel(ans);
  if (risk === 'high' && ans.q1 && ans.q2) {
    return aiTextsRisk[ans.q1 + ans.q2] || null;
  }
  if (ans.q1 && ans.q2 && ans.q3) {
    return aiTexts[ans.q1 + ans.q2 + ans.q3] || null;
  }
  return null;
}

function getModifiers(program, ans) {
  const mods = [];
  const risk = getRiskLevel(ans);
  if (risk === 'moderate') mods.push(modifiers.risk_moderate);
  if (risk === 'high') mods.push(modifiers.risk_high);

  const need = ans.q3;
  if (need === 'A') mods.push(modifiers.need_onboarding);
  if (need === 'B') mods.push(modifiers.need_structure);
  if (need === 'C') mods.push(modifiers.need_logistics);

  const info = programInfo[program];
  if (info && info.hasAssessment) mods.push(modifiers.assessment);

  if (isSwitcher(ans)) mods.push(modifiers.switcher);

  return mods;
}

function submitPhone() {

    if (el) el.focus();

function toggleMultiSelect(qId, key) {
  if (!answers[qId]) answers[qId] = [];
  const idx = answers[qId].indexOf(key);
  if (idx >= 0) {
    answers[qId].splice(idx, 1);
  } else {
    answers[qId].push(key);
  }
  renderQuiz();
}

function skipMultiSelect(qId) {
  answers[qId] = [];
  answers[qId + 'custom'] = '';
  nextStep();
}

function selectOption(qId, key) {
  // Сброс клуба при смене города
  if (qId === 'qCity' && answers.qClub) {
    const club = clubInfo[answers.qClub];
    const cityMap = { almaty: 'Алматы', astana: 'Астана' };
    if (club && club.city !== cityMap[key]) {
      delete answers.qClub;
    }
  }
  answers[qId] = key;
  if (qId === 'qClub') {
    localStorage.setItem('hj_club', key);
  }
  setTimeout(() => {
    nextStep();
  }, 200);
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    // Skip conditional steps going backwards
    while (currentStep > 0 && steps[currentStep].condition && !steps[currentStep].condition()) {
      currentStep--;
    }
    renderQuiz();
  }
}

function debugSetAnswer(qId, value) {
  if (value) {
    answers[qId] = value;
  } else {
    delete answers[qId];
  }
  // If gender, age, Q1-Q4 answered, show result (Q5 is optional)
  const requiredQs = questions.filter(q => !q.multiSelect && !q.inputType);
  const allAnswered = requiredQs.every(q => answers[q.id]);
  if (allAnswered) {
    currentStep = steps.length;
  }
  renderQuiz();
}

function renderScenarios(filter) {
  const panel = document.getElementById('scenariosPanel');
  const q1Keys = ['A', 'B', 'C', 'D'];
  const q2Keys = ['A', 'B', 'C', 'D'];
  const q3Keys = ['A', 'B', 'C', 'D'];
  const q4Keys = ['A', 'B', 'C'];

  const scenarios = [];
  for (const q1 of q1Keys) {
    for (const q2 of q2Keys) {
      for (const q3 of q3Keys) {
        for (const q4 of q4Keys) {
          const ans = { q1, q2, q3, q4 };
          const rec = getRecommendation(ans);
          if (rec) {
            scenarios.push({ ans, rec });
          }
        }
      }
    }
  }

  const filtered = filter === 'all' ? scenarios : scenarios.filter(s => s.rec.finalProgram === filter);

  // Stats
  const counts = { 'first-step': 0, 'basecamp': 0, 'heros-week': 0 };
  const switcherCount = scenarios.filter(s => s.rec.switcher).length;
  scenarios.forEach(s => counts[s.rec.finalProgram]++);
  const total = scenarios.length;

  const tagClass = (prog) => {
    if (prog === 'first-step') return 'tag-fs';
    if (prog === 'basecamp') return 'tag-bc';
    return 'tag-hw';
  };

  panel.innerHTML = `
    <div class="debug-title" style="margin-bottom:16px">Все сценарии (${total} комбинаций)</div>

    <div class="scenarios-stats">
      <div class="stat-card">
        <div class="stat-value" style="color:var(--green)">${counts['first-step']}</div>
        <div>Первый Шаг (${(counts['first-step']/total*100).toFixed(0)}%)</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--blue)">${counts['basecamp']}</div>
        <div>Basecamp (${(counts['basecamp']/total*100).toFixed(0)}%)</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--purple)">${counts['heros-week']}</div>
        <div>Hero's Week (${(counts['heros-week']/total*100).toFixed(0)}%)</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--yellow)">${switcherCount}</div>
        <div>Switchers (${(switcherCount/total*100).toFixed(0)}%)</div>
      </div>
    </div>

    <div class="scenarios-filters">
      <button class="filter-btn ${filter === 'all' ? 'active' : ''}" onclick="renderScenarios('all')">Все</button>
      <button class="filter-btn ${filter === 'first-step' ? 'active' : ''}" onclick="renderScenarios('first-step')">Первый Шаг</button>
      <button class="filter-btn ${filter === 'basecamp' ? 'active' : ''}" onclick="renderScenarios('basecamp')">Basecamp</button>
      <button class="filter-btn ${filter === 'heros-week' ? 'active' : ''}" onclick="renderScenarios('heros-week')">Hero's Week</button>
      <button class="filter-btn ${filter === 'switcher' ? 'active' : ''}" onclick="renderScenarios('switcher')">Switchers</button>
    </div>

    <div style="max-height:60vh;overflow-y:auto;border-radius:var(--radius)">
      <table class="scenarios-table">
        <thead>
          <tr>
            <th>Q1 Цель</th>
            <th>Q2 Опыт</th>
            <th>Q3 Потребность</th>
            <th>Q4 Здоровье</th>
            <th>Fitness</th>
            <th>Motiv.</th>
            <th>Switcher</th>
            <th>Base</th>
            <th>Final</th>
          </tr>
        </thead>
        <tbody>
          ${(filter === 'switcher' ? scenarios.filter(s => s.rec.switcher) : filtered).slice(0, 200).map(s => `
            <tr>
              <td>${s.ans.q1} (${questions[0].options.find(o=>o.key===s.ans.q1).tag})</td>
              <td>${s.ans.q2} (${questions[1].options.find(o=>o.key===s.ans.q2).tag})</td>
              <td>${s.ans.q3} (${questions[2].options.find(o=>o.key===s.ans.q3).tag})</td>
              <td>${s.ans.q4} (${questions[3].options.find(o=>o.key===s.ans.q4).tag})</td>
              <td>${s.rec.fitness} (${s.rec.fitCat})</td>
              <td>${s.rec.motivation.toFixed(1)} (${s.rec.motCat})</td>
              <td style="color:${s.rec.switcher ? 'var(--yellow)' : 'var(--text-muted)'}">${s.rec.switcher ? 'ДА' : '—'}</td>
              <td><span class="debug-tag ${tagClass(s.rec.baseProgram)}">${programInfo[s.rec.baseProgram].name}</span></td>
              <td><span class="debug-tag ${tagClass(s.rec.finalProgram)}">${programInfo[s.rec.finalProgram].name}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

const q1Labels = { A: 'Сбросить вес и подтянуть тело', B: 'Стать выносливее и сильнее', C: 'Наконец начать тренироваться регулярно', D: 'Просто попробовать — интересно, что это' };
const q2Labels = { A: 'Никогда не ходил(а) в зал', B: 'Ходил(а) раньше, но бросил(а)', C: 'Хожу сейчас, но хочу попробовать что-то другое', D: 'Занимаюсь сам(а) — дома, на улице, без зала' };
const q3Labels = { A: 'Чтобы всё объяснили и помогли', B: 'Чтобы был понятный план и структура', C: 'Чтобы было удобно по времени и локации', D: 'Просто хочу потренироваться — разберусь сам(а)' };
const q4Labels = { A: 'Нет ограничений', B: 'Да, но тренироваться могу', C: 'Серьёзные — нужен щадящий режим' };

const healthDetailLabels = {
  'back': 'спина/поясница', 'knees': 'колени', 'shoulders': 'плечи', 'neck': 'шея',
  'heart': 'сердце/давление', 'breathing': 'астма/дыхание', 'varicose': 'варикоз', 'post-surgery': 'послеоперационный период'
};

function getHealthDetailsPrompt(ans) {
  const details = ans.q4details || [];
  const custom = ans.q4detailscustom || '';
  if (details.length === 0 && !custom) return '';
  const parts = details.map(k => healthDetailLabels[k]).filter(Boolean);
  if (custom) parts.push(custom);
  return '\n- Конкретные ограничения: ' + parts.join(', ');
}

async function generateAiText(ans, rec) {
  const fears = ans.q5 || [];
  const fearsCustom = ans.q5custom || '';
  const cacheKey = 'rec_' + (ans.qClub||'') + (ans.qGender||'X') + (ans.qAge||'') + (ans.qOccupation||'') + ans.q1 + ans.q2 + ans.q3 + ans.q4 + '_' + (ans.qHeight||'') + (ans.qWeight||'') + '_' + ((ans.q2details||[]).join(',')) + '_' + fears.join(',') + '_' + fearsCustom;
  if (aiCache[cacheKey]) {
    document.getElementById('aiLiveText').innerHTML = `<p style="font-size:14px;line-height:1.6">${aiCache[cacheKey]}</p>`;
    return;
  }

  const info = programInfo[rec.finalProgram];

  const genderStr = ans.qGender ? genderLabels[ans.qGender] : 'Не указано';
  const ageStr = ans.qAge ? ageLabels[ans.qAge] : 'Не указано';
  const occStr = ans.qOccupation ? occupationLabels[ans.qOccupation] : 'Не указано';
  const clubData = ans.qClub ? clubInfo[ans.qClub] : null;
  const clubStr = clubData ? `${clubData.name} (${clubData.city}), зоны: ${clubData.zones.join(', ')}` : 'Не указано';
  const fmt = getClubFormats(ans);

  let fearsPrompt = '';
  if (fears.length > 0 || fearsCustom) {
    let fearsList = fears.map(key => fearResponses[key]?.label).filter(Boolean).join(', ');
    if (fearsCustom) fearsList += (fearsList ? ', ' : '') + '«' + fearsCustom + '»';
    fearsPrompt = `\n\nЧеловека беспокоит: ${fearsList}\nВ тексте мягко сними эти сомнения — не списком, а органично вплетая в рекомендацию.`;
  }

  const prompt = `Ты — копирайтер фитнес-бренда Hero's Journey. Напиши короткий персональный текст, объясняющий почему программа «${info.name}» подходит этому человеку.

Профиль из анкеты:
- Студия: ${clubStr}
- Пол: ${genderStr}
- Возраст: ${ageStr}
- Род деятельности: ${occStr}
- Цель: ${q1Labels[ans.q1]}
- Опыт: ${q2Labels[ans.q2]}
- Важно в первых тренировках: ${q3Labels[ans.q3]}
- Ограничения по здоровью: ${q4Labels[ans.q4]}${getHealthDetailsPrompt(ans)}${getActivityDetailsPrompt(ans)}
- Рост/вес: ${ans.qHeight && ans.qWeight ? ans.qHeight + ' см, ' + ans.qWeight + ' кг (BMI: ' + getBmiLabel(calcBMI(ans)) + ')' : 'не указано'}
- Доступные форматы тренировок: ${fmt.allFormats}${fearsPrompt}

Программа: ${info.name} — ${info.trainings} тренировок, ${info.duration}. ${info.tagline}
${info.hasAssessment ? (info.assessmentAtEnd ? 'Assessment в конце программы — когда человек уже освоил оборудование и технику.' : 'Включает персональный assessment в начале программы.') : ''}

Форматы тренировок HJ: силовые (работа с весами), HIIT/Bootcamp/Metcon (жиросжигающее кардио), Reshape (гибкость и восстановление на реформерах).

Правила:
- Обращайся на «ты»
