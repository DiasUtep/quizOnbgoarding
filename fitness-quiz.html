<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HJ Фитнес-квиз — Узнай свой уровень</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #06060a;
    --surface: rgba(255, 255, 255, 0.04);
    --surface2: rgba(255, 255, 255, 0.07);
    --surface-solid: #111116;
    --border: rgba(255, 255, 255, 0.06);
    --text: #f0f0f5;
    --text-muted: #5a5a72;
    --text-secondary: #8888a0;
    --accent: #7B3DFF;
    --accent-light: #9D6FFF;
    --accent-soft: #6930d4;
    --accent-glow: rgba(123, 61, 255, 0.10);
    --accent-glow-strong: rgba(123, 61, 255, 0.22);
    --green: #22c55e;
    --blue: #3b82f6;
    --purple: #9D6FFF;
    --yellow: #eab308;
    --red: #ef4444;
    --radius: 20px;
    --radius-lg: 28px;
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    --shadow-accent: 0 12px 40px rgba(123, 61, 255, 0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  @keyframes meshMove {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -50px) scale(1.05); }
    50% { transform: translate(-20px, 20px) scale(0.95); }
    75% { transform: translate(10px, -30px) scale(1.02); }
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    position: relative;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  /* Animated gradient mesh */
  body::before {
    content: '';
    position: fixed;
    top: -40vh;
    left: 40%;
    width: 100vw;
    height: 80vh;
    background:
      radial-gradient(ellipse 600px 400px at 30% 40%, rgba(123, 61, 255, 0.08) 0%, transparent 70%),
      radial-gradient(ellipse 500px 500px at 70% 20%, rgba(99, 40, 220, 0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: meshMove 20s ease-in-out infinite;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30vh;
    right: -15vw;
    width: 60vw;
    height: 60vh;
    background:
      radial-gradient(ellipse 400px 400px at 60% 60%, rgba(123, 61, 255, 0.06) 0%, transparent 70%),
      radial-gradient(ellipse 300px 300px at 30% 70%, rgba(34, 197, 94, 0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: meshMove 25s ease-in-out infinite reverse;
  }
  /* Noise texture overlay */
  .noise-overlay {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    background: rgba(6, 6, 10, 0.85);
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .header-logo span {
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-actions { display: flex; gap: 8px; }
  .btn-small {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-small:hover { border-color: var(--accent); color: var(--text); }
  .btn-small.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  /* Layout */
  .layout { display: flex; min-height: calc(100vh - 57px); position: relative; z-index: 1; }
  .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 28px; }
  .debug-panel {
    width: 380px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    padding: 24px;
    overflow-y: auto;
    display: none;
    max-height: calc(100vh - 57px);
  }
  .debug-panel.visible { display: block; }

  /* Progress */
  .progress-wrap { width: 100%; max-width: 480px; margin-bottom: 48px; }
  .progress-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .progress-bar { height: 3px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: visible; position: relative; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-soft), var(--accent), var(--accent-light));
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    box-shadow: 0 0 12px rgba(123, 61, 255, 0.4);
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -5px;
    top: -4px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--accent-light);
    box-shadow: 0 0 20px rgba(123, 61, 255, 0.7), 0 0 40px rgba(123, 61, 255, 0.3);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 20px rgba(123, 61, 255, 0.7), 0 0 40px rgba(123, 61, 255, 0.3); }
    50% { box-shadow: 0 0 25px rgba(123, 61, 255, 0.9), 0 0 50px rgba(123, 61, 255, 0.5); }
  }

  /* Quiz Card */
  .quiz-card {
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes optionIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .quiz-question {
    font-size: 32px;
    font-weight: 300;
    margin-bottom: 40px;
    letter-spacing: -0.8px;
    line-height: 1.3;
    color: var(--text);
  }
  .quiz-question { position: relative; }
  .why-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0;
    margin-left: 8px;
    vertical-align: middle;
    transition: color 0.2s;
    position: relative;
    top: -2px;
  }
  .why-btn:hover { color: var(--accent-light); }
  .why-tooltip {
    display: none;
    margin-top: 14px;
    padding: 14px 18px;
    background: rgba(123, 61, 255, 0.08);
    border: 1px solid rgba(123, 61, 255, 0.15);
    border-radius: 14px;
    font-size: 14px;
    font-weight: 300;
    line-height: 1.6;
    color: var(--text-secondary);
    animation: fadeIn 0.2s ease;
  }
  .why-tooltip.visible { display: block; }

  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-option {
    padding: 20px 24px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: rgba(255, 255, 255, 0.025);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    font-size: 15px;
    font-weight: 400;
    position: relative;
    overflow: hidden;
    animation: optionIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    backdrop-filter: blur(8px);
  }
  .quiz-option:nth-child(1) { animation-delay: 0.05s; }
  .quiz-option:nth-child(2) { animation-delay: 0.1s; }
  .quiz-option:nth-child(3) { animation-delay: 0.15s; }
  .quiz-option:nth-child(4) { animation-delay: 0.2s; }
  .quiz-option:nth-child(5) { animation-delay: 0.25s; }
  .quiz-option:nth-child(6) { animation-delay: 0.3s; }
  .quiz-option::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(to bottom, var(--accent), var(--accent-light));
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .quiz-option::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at left center, rgba(123, 61, 255, 0.06) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .quiz-option:hover { border-color: rgba(123, 61, 255, 0.25); transform: translateX(4px); }
  .quiz-option:hover::before { transform: scaleY(1); }
  .quiz-option:hover::after { opacity: 1; }
  .quiz-option.selected {
    border-color: rgba(123, 61, 255, 0.5);
    background: rgba(123, 61, 255, 0.08);
    box-shadow: 0 4px 24px rgba(123, 61, 255, 0.12), inset 0 0 0 1px rgba(123, 61, 255, 0.1);
  }
  .quiz-option.selected::before { transform: scaleY(1); background: var(--accent-light); }
  .quiz-option.selected::after { opacity: 1; }

  /* Navigation */
  .quiz-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 32px;
    max-width: 520px;
    width: 100%;
  }
  .btn-back {
    padding: 10px 24px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    background: transparent;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.3px;
  }
  .btn-back:hover { color: var(--text); border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); }
  .btn-back.hidden { visibility: hidden; }

  /* Result */
  .result-card {
    width: 100%;
    max-width: 520px;
    animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .result-header {
    text-align: center;
    margin-bottom: 32px;
    padding: 40px 32px 36px;
    position: relative;
    overflow: hidden;
    border-radius: var(--radius-lg);
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(123, 61, 255, 0.08) 0%, transparent 60%),
      linear-gradient(180deg, rgba(15, 15, 22, 0.95) 0%, rgba(6, 6, 10, 0.98) 100%);
    border: 1px solid rgba(123, 61, 255, 0.1);
    box-shadow: 0 16px 60px rgba(0, 0, 0, 0.4);
  }
  .result-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 15%, rgba(123, 61, 255, 0.35) 50%, transparent 85%);
  }
  .result-header h2 {
    font-size: 11px;
    color: var(--accent-light);
    font-weight: 500;
    margin-bottom: 20px;
    position: relative;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .result-basis {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 12px;
    position: relative;
    letter-spacing: 0.3px;
    font-weight: 300;
    max-width: 300px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }
  .result-duration {
    font-size: 48px;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff 20%, var(--accent-light) 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    letter-spacing: -1.5px;
    line-height: 1.1;
  }
  .result-program-sub {
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    position: relative;
    font-weight: 300;
  }
  .result-tagline { color: var(--text-muted); font-size: 14px; position: relative; font-weight: 300; line-height: 1.5; }
  .result-price {
    text-align: center;
    padding: 32px;
    margin-top: 24px;
    background: linear-gradient(135deg, rgba(123, 61, 255, 0.06) 0%, rgba(255,255,255,0.02) 100%);
    border: 1px solid rgba(123, 61, 255, 0.1);
    border-radius: var(--radius);
    position: relative;
    overflow: hidden;
  }
  .result-price::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(123, 61, 255, 0.2), transparent);
  }
  .result-price-amount {
    font-size: 40px;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 30%, var(--accent-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }
  .result-price-detail {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 8px;
    font-weight: 300;
  }

  .result-section {
    background:
      radial-gradient(ellipse at top right, rgba(123, 61, 255, 0.04) 0%, transparent 50%),
      rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 14px;
    backdrop-filter: blur(12px);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
  }
  .result-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(123, 61, 255, 0.15), transparent);
  }
  .result-section:hover { border-color: rgba(123, 61, 255, 0.2); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
  .result-section h3 {
    font-size: 11px;
    color: var(--accent-light);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-section h3::before {
    content: '';
    width: 16px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    flex-shrink: 0;
  }
  .result-section ul { list-style: none; }
  .result-section li {
    padding: 8px 0;
    padding-left: 22px;
    position: relative;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.6;
  }
  .result-section li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 15px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px rgba(123, 61, 255, 0.5);
  }
  .result-modifier {
    background: linear-gradient(135deg, rgba(123, 61, 255, 0.08), rgba(123, 61, 255, 0.03));
    border: 1px solid rgba(123, 61, 255, 0.15);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 14px;
    font-size: 14px;
    line-height: 1.6;
    font-weight: 300;
    position: relative;
    overflow: hidden;
  }
  .result-modifier::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, var(--accent), var(--accent-light));
  }
  .result-cta {
    display: block;
    width: 100%;
    padding: 20px;
    border: none;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--accent) 0%, #5A1FD6 100%);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 28px;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 8px 32px rgba(123, 61, 255, 0.3);
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }
  .result-cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 3s ease-in-out infinite;
  }
  .result-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(123, 61, 255, 0.45); }
  .result-cta:active { transform: translateY(0); }
  .btn-restart {
    display: block;
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .btn-restart:hover { color: var(--text); border-color: var(--text-muted); }

  /* Alt programs */
  .alt-programs { margin-top: 40px; padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.04); }
  .alt-programs-title { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; text-align: center; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }
  .alt-card {
    background: rgba(255, 255, 255, 0.025);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    backdrop-filter: blur(12px);
    position: relative;
    overflow: hidden;
  }
  .alt-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top right, rgba(123, 61, 255, 0.06) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .alt-card:hover { border-color: rgba(123, 61, 255, 0.2); transform: translateY(-2px); }
  .alt-card:hover::before { opacity: 1; }
  .alt-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; position: relative; }
  .alt-card-name { font-weight: 600; font-size: 16px; }
  .alt-card-price { color: var(--accent-light); font-weight: 700; font-size: 17px; }
  .alt-card-details { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; position: relative; }
  .alt-card-diff { font-size: 13px; color: var(--text-secondary); position: relative; font-weight: 300; line-height: 1.5; }
  .alt-card-toggle { font-size: 12px; color: var(--accent-light); margin-top: 14px; text-align: center; transition: opacity 0.2s; letter-spacing: 0.5px; }
  .alt-card.expanded .alt-card-toggle { display: none; }
  .alt-card-expand { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
  .alt-card.expanded .alt-card-expand { max-height: 600px; }
  .alt-card.expanded { border-color: rgba(123, 61, 255, 0.3); box-shadow: 0 8px 40px rgba(123, 61, 255, 0.1); }
  .alt-tl { margin-top: 18px; display: flex; flex-direction: column; gap: 12px; padding-left: 4px; }
  .alt-tl-step { display: flex; gap: 12px; font-size: 13px; }
  .alt-tl-label { color: var(--accent-light); font-weight: 600; white-space: nowrap; min-width: 90px; font-size: 12px; letter-spacing: 0.3px; }
  .alt-tl-text { color: var(--text-muted); font-weight: 300; line-height: 1.5; }
  .alt-features { margin: 18px 0; padding-left: 18px; font-size: 13px; color: var(--text-muted); display: flex; flex-direction: column; gap: 8px; font-weight: 300; }
  .alt-card-cta {
    display: block;
    width: 100%;
    padding: 16px;
    border: 1px solid rgba(123, 61, 255, 0.4);
    border-radius: var(--radius);
    background: rgba(123, 61, 255, 0.06);
    color: var(--accent-light);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
  }
  .alt-card-cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent), #5A1FD6);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .alt-card-cta:hover { color: white; box-shadow: var(--shadow-accent); transform: translateY(-1px); }
  .alt-card-cta:hover::before { opacity: 1; }
  .alt-card-cta span { position: relative; z-index: 1; }

  /* AI mode */
  .ai-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .ai-toggle:hover { border-color: var(--accent); }
  .ai-toggle.active { border-color: var(--green); color: var(--green); background: rgba(34, 197, 94, 0.1); }
  .ai-toggle .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); transition: background 0.2s; }

const CLAUDE_PROXY_URL = 'https://admin.herosjourney.kz/pay/api/claude/messages';
let aiCache = {};

function getAnswerSummary() {
  const lines = [];
  for (let i = 0; i < 8; i++) {
    const q = questions[i];
    const key = answers[q.id];
    if (!key) continue;
    const opt = q.options.find(o => o.key === key);
    if (opt) lines.push(`- ${q.question} → ${opt.label}`);
  }
  return lines.join('\n');
}

function formatAiText(text) {
  let paragraphs = text.split(/\n\n+/).filter(p => p.trim());
  if (paragraphs.length <= 1) {
    const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
    if (sentences.length >= 6) {
      const third = Math.ceil(sentences.length / 3);
      paragraphs = [
        sentences.slice(0, third).join('').trim(),
        sentences.slice(third, third * 2).join('').trim(),
        sentences.slice(third * 2).join('').trim()
      ];
    } else { return `<p class="ai-paragraph">${text}</p>`; }
  }
  if (paragraphs.length <= 1) return `<p class="ai-paragraph">${paragraphs[0]}</p>`;
  const first = `<p class="ai-paragraph">${paragraphs[0]}</p>`;
  const rest = paragraphs.slice(1).map(p => `<p class="ai-paragraph">${p}</p>`).join('');
  return `<div class="ai-expandable">${first}<div class="ai-expand-content">${rest}</div><button class="ai-expand-toggle" onclick="toggleAiExpand(this)">Читать дальше</button></div>`;
}

function toggleAiExpand(btn) {
  const wrap = btn.closest('.ai-expandable');
  wrap.classList.toggle('expanded');
  btn.textContent = wrap.classList.contains('expanded') ? 'Свернуть' : 'Читать дальше';
}

async function generateAiText(profile, info) {
  const cacheKey = 'rec_' + profile.name + '_' + (answers.qClub||'');
  if (aiCache[cacheKey]) {
    document.getElementById('aiLiveText').innerHTML = formatAiText(aiCache[cacheKey]);
    return;
  }

  const clubData = answers.qClub ? clubInfo[answers.qClub] : null;
  const clubStr = clubData ? `${clubData.name} (${clubData.city})` : 'Не указано';

  const prompt = `Ты — копирайтер фитнес-студии Hero's Journey (HJ).

Человек прошёл развлекательный фитнес-квиз. Вот его ответы:
${getAnswerSummary()}

Его профиль: ${profile.name} (активность: ${profile.traits.activity}, мотивация: ${profile.traits.motivation})
Рекомендованная программа: ${info.name} — ${info.trainings} тренировок за ${info.durationShort}
Студия: ${clubStr}

Напиши персональную рекомендацию, которая:
1. Ссылается на конкретные ответы человека (не все, а 2-3 самых показательных)
2. Объясняет, почему именно эта программа подходит под его уровень и мотивацию
3. Снимает главный страх/барьер, который виден из ответов

Формат ответа:
- Раздели текст на 3 абзаца, разделённых двойным переносом строки (\n\n)
- Первый абзац: ситуация человека и почему эта программа для него
- Второй абзац: что конкретно его ждёт (форматы, подход тренера)
- Третий абзац: результат после прохождения программы
- Каждый абзац 2-3 предложения, без заголовков и буллетов

Тон: дружелюбный, прямой, без пафоса. На «ты».
Если упоминаешь термины HJ (HIIT, Metcon, Reshape, assessment), обязательно объясняй что это значит.
Никогда не используй английские термины для сегментов: switcher, lapsed, newbie, beginner и т.д.
Не используй слово «интенсивный» — замени на «активный», «энергичный», «с нагрузкой».
Пиши на русском.`;

  try {
    const resp = await fetch(CLAUDE_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o',
        max_tokens: 500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const text = data.choices[0].message.content;
    aiCache[cacheKey] = text;
    const el = document.getElementById('aiLiveText');
    if (el) el.innerHTML = formatAiText(text);
  } catch(e) {
    const el = document.getElementById('aiLiveText');
    if (el) el.innerHTML = `<div style="color:var(--red);font-size:13px">Ошибка: ${e.message}</div>`;
  }
}

// ========== STATE ==========
let currentStep = -1; // -1 = intro
let answers = {};

// ========== SCORING ==========
function getScores() {
  let fitness = 0, motivation = 0, count = 0;
  for (let i = 0; i < 8; i++) {
    const q = questions[i];
    const ans = answers[q.id];
    if (!ans) continue;
    const opt = q.options.find(o => o.key === ans);
    if (opt) { fitness += opt.fitness; motivation += opt.motivation; count++; }
  }
  return { fitness, motivation, count };
}

function getProfile() {
  const { fitness, motivation } = getScores();
  const fitNorm = fitness / 24;
  const motNorm = motivation / 12;
  let fitCat = fitNorm < 0.3 ? 'beginner' : fitNorm < 0.65 ? 'active' : 'advanced';
  let motCat = motNorm < 0.3 ? 'low' : motNorm < 0.65 ? 'medium' : 'high';
  const key = `${fitCat}-${motCat}`;
  return { profile: profiles[key], key, fitness, motivation, fitNorm, motNorm, fitCat, motCat };
}

// ========== RENDER ==========
function render() {
  if (currentStep === -1) { renderIntro(); return; }
  if (currentStep >= steps.length) { renderResult(); return; }

  const step = steps[currentStep];

  // Track step
  const stepProps = { step_index: currentStep, step_type: step.type };
  if (step.type === 'question') {
    const q = questions[step.questionIndex];
    stepProps.question_id = q.id;
    stepProps.question_text = q.question;
  } else if (step.type === 'interstitial') {
    stepProps.interstitial_id = step.questionId;
  }
  trackEvent('quiz_step_viewed', stepProps);

  if (step.type === 'interstitial') { renderInterstitial(step.questionId); return; }

  const q = questions[step.questionIndex];
  if (q.inputType === 'club') { renderClub(q); return; }
  if (q.inputType === 'phone') { renderPhone(q); return; }
  if (q.id === 'qCity') { renderCityQuestion(q); return; }
  renderQuestion(step.questionIndex);
}

function getProgressInfo() {
  const total = steps.length;
  const current = currentStep + 1;
  return { total, current, percent: (current / total * 100).toFixed(0) };
}

function renderProgressBar() {
  const { total, current, percent } = getProgressInfo();
  return `<div class="progress-wrap">
    <div class="progress-label">Шаг ${current} из ${total}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
  </div>`;
}

function renderQuestion(qIndex) {
  const main = document.getElementById('mainArea');
  const q = questions[qIndex];
  const icons = questionIconMap[q.id];
  const questionNum = qIndex + 1;

  main.innerHTML = `
    ${renderProgressBar()}
    <button class="btn-back ${currentStep === 0 ? 'hidden' : ''}" onclick="goBack()">← Назад</button>
    <div class="quiz-card">
      <div class="quiz-question">${q.question}</div>
      ${q.context ? `<div class="quiz-context">${q.context}</div>` : ''}
      <div class="quiz-options">
        ${q.options.map(o => `
          <div class="quiz-option" onclick="selectAnswer('${q.id}', '${o.key}')">
            ${icons ? `<div class="quiz-option-icon"><span class="opt-icon">${icons[o.key]}</span><span>${o.label}</span></div>` : `<span>${o.label}</span>`}
          </div>
        `).join('')}
      </div>

}

function renderCityQuestion(q) {
  const main = document.getElementById('mainArea');
  const cityIcons = { almaty: SVG.city, astana: SVG.city };

  main.innerHTML = `
    ${renderProgressBar()}
    <button class="btn-back" onclick="goBack()">← Назад</button>
    <div class="quiz-card">
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-options">
        ${q.options.map(o => `
          <div class="quiz-option" onclick="selectOption('qCity', '${o.key}')">
            <div class="quiz-option-icon"><span class="opt-icon">${cityIcons[o.key]}</span><span>${o.label}</span></div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function renderClub(q) {
  const main = document.getElementById('mainArea');
  const selected = answers.qClub || '';
  const cityMap = { almaty: 'Алматы', astana: 'Астана' };
  const selectedCity = cityMap[answers.qCity] || null;
  const filteredClubs = [];
  Object.entries(clubInfo).forEach(([key, club]) => {
    if (selectedCity && club.city !== selectedCity) return;
    filteredClubs.push({ key, ...club });
  });

  main.innerHTML = `
    ${renderProgressBar()}
    <button class="btn-back" onclick="goBack()">← Назад</button>
    <div class="quiz-card">
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-options">
        ${filteredClubs.map(c => `
          <div class="club-option ${selected === c.key ? 'selected' : ''}"
               onclick="selectOption('qClub', '${c.key}')">
            <div class="club-name"><span class="club-pin">${SVG.pin}</span> ${c.name}</div>
            <div class="club-address">${c.address}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function renderPhone(q) {
  const main = document.getElementById('mainArea');
  const ph = answers.qPhone || '';
  main.innerHTML = `
    ${renderProgressBar()}
    <div class="quiz-card">
      <div class="quiz-question">${q.question}</div>
      <div style="margin-bottom:20px">
        <label style="font-size:13px;color:var(--text-muted);margin-bottom:8px;display:block">Номер телефона</label>
        <div style="display:flex;align-items:center;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);padding:0 16px;transition:border-color 0.2s" id="phoneWrap">
          <input type="tel" id="inputPhone" placeholder="8 777 777 77 77" value="${ph}" maxlength="11"
                 oninput="answers.qPhone = this.value.trim(); document.getElementById('phoneWrap').style.borderColor='rgba(255,255,255,0.06)'"
                 style="flex:1;background:transparent;border:none;color:var(--text);font-size:20px;font-weight:600;padding:14px 0;outline:none">
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:6px">Мы свяжемся с тобой для записи на первую тренировку</div>
      </div>
      <button class="btn-continue" onclick="submitPhone()">Продолжить</button>
    </div>
    <div style="margin-top:24px"><button class="btn-back" onclick="goBack()">← Назад</button></div>`;
  setTimeout(() => { const el = document.getElementById('inputPhone'); if(el) el.focus(); }, 50);
}

function selectAnswer(qId, key) {
  answers[qId] = key;
  currentStep++;
  render();
}

function selectOption(qId, key) {
  if (qId === 'qCity' && answers.qClub) {
    const club = clubInfo[answers.qClub];
    const cityMap = { almaty: 'Алматы', astana: 'Астана' };
    if (club && club.city !== cityMap[key]) delete answers.qClub;
  }
  answers[qId] = key;
  if (qId === 'qClub') localStorage.setItem('hj_club', key);
  setTimeout(() => { currentStep++; render(); }, 200);
}

function submitPhone() {
  const phone = (answers.qPhone || '').trim();
  const digits = phone.replace(/\D/g, '');
  if (!phone || digits.length < 7 || digits[0] !== '8') {
    const wrap = document.getElementById('phoneWrap');
    if (wrap) wrap.style.borderColor = 'var(--red)';
    const el = document.getElementById('inputPhone');
    if (el) el.focus();
    return;
  }
  localStorage.setItem('hj_phone', phone);
  trackEvent('phone_submitted', { phone });
  fetch('https://admin.herosjourney.kz/pay/api/createQuizLead', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phoneNumber: phone })
  }).catch(e => console.warn('createQuizLead failed:', e));
  nextStep();
}

function nextStep() { currentStep++; render(); }

function goBack() {
  if (currentStep <= 0) return;
  if (currentStep >= 2 && steps[currentStep - 1]?.type === 'interstitial') {
    currentStep -= 2;
  } else { currentStep--; }
  render();
}

function renderInterstitial(questionId) {
  const main = document.getElementById('mainArea');
  const answer = answers[questionId];
  const content = interstitials[questionId]?.[answer];
  if (!content) { currentStep++; render(); return; }

  const icon = interstitialIcons[questionId]?.[answer] || SVG.bolt;

  main.innerHTML = `
    ${renderProgressBar()}
    <div class="interstitial">
      <div class="interstitial-icon">${icon}</div>
      <div class="interstitial-text">${content.text}</div>
      <div class="interstitial-sub">${content.sub}</div>
      <button class="btn-interstitial" onclick="nextStep()">Продолжить</button>
    </div>
    <div style="margin-top:24px"><button class="btn-back" onclick="goBack()">← Назад</button></div>`;
}

function shareResult() {
  const { profile } = getProfile();
  const icon = profileIcons[getProfile().key] ? '' : '';
  const text = `Мой фитнес-профиль: ${profile.name}! Узнай свой →`;
  if (navigator.share) {
    navigator.share({ title: 'HJ Фитнес-квиз', text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(text + ' ' + window.location.href);
    const btn = document.querySelector('.share-btn');
    btn.textContent = 'Скопировано!';
    setTimeout(() => { btn.textContent = 'Поделиться результатом'; }, 2000);
  }
}

function restart() {
  currentStep = -1;
  answers = {};
  aiCache = {};
  render();
}

async function renderPaymentScreen(programKey, programName, phone, clubSlug) {
  const main = document.getElementById('mainArea');
  const clubId = CLUB_IDS[clubSlug] || '';
  const price = PROGRAM_PRICES[programKey] || '';

  main.innerHTML = `<div style="width:100%;max-width:480px"><div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px"><div style="background:var(--surface2);border-radius:20px;height:26px;width:100px;margin-bottom:14px;animation:fadeIn 1s infinite alternate"></div><div style="background:var(--surface2);border-radius:8px;height:32px;width:60%;margin-bottom:10px"></div><div style="background:var(--surface2);border-radius:8px;height:18px;width:40%;margin-bottom:24px"></div><div style="background:var(--surface2);border-radius:var(--radius);height:58px;margin-bottom:24px"></div><div style="background:var(--surface2);border-radius:var(--radius);height:52px;margin-bottom:12px"></div><div style="background:var(--surface2);border-radius:var(--radius);height:52px"></div></div></div>`;

  let dateBlock = '';
  if (programKey === 'first-step') {
    try {
      const resp = await fetch(`${PAY_API}/getFSEvents`);

      const fmt = iso => new Intl.DateTimeFormat('ru-RU', { day:'2-digit', month:'long', year:'numeric' }).format(new Date(iso));
      let opts = '';
      if (nextMarathonEvent) opts += `<option value="${nextMarathonEvent._id}">${fmt(nextMarathonEvent.startTime)}</option>`;
      if (currentMarathonEvent && currentMarathonEvent._id !== nextMarathonEvent?._id)
        opts += `<option value="${currentMarathonEvent._id}">${fmt(currentMarathonEvent.startTime)}</option>`;
      dateBlock = `<div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Дата старта</div><select id="payEventSelect" style="width:100%;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;margin-bottom:24px;appearance:none;outline:none">${opts}</select>`;
    } catch(e) { dateBlock = `<div style="color:var(--red);font-size:14px;margin-bottom:16px">Не удалось загрузить даты</div>`; }
  } else {
    const today = new Date();
    const minDate = today.toISOString().split('T')[0];
    const next = new Date(today);
    next.setDate(today.getDate() + ((8 - today.getDay()) % 7 || 7));
    const defaultDate = next.toISOString().split('T')[0];
    dateBlock = `<div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Дата старта</div><input type="date" id="payDateInput" min="${minDate}" value="${defaultDate}" style="width:100%;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;margin-bottom:24px;outline:none;color-scheme:dark">`;
  }

  main.innerHTML = `<div style="width:100%;max-width:480px"><div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;animation:fadeIn 0.3s ease"><div style="display:inline-block;padding:4px 12px;border-radius:20px;background:var(--accent-glow);border:1px solid rgba(123,61,255,0.3);color:var(--accent);font-size:13px;font-weight:600;margin-bottom:12px">Оплата программы</div><div style="font-size:26px;font-weight:700;margin-bottom:6px">${programName}</div><div style="font-size:14px;color:var(--text-muted);margin-bottom:20px">${clubSlug ? getClubDisplayName(clubSlug) : ''}</div><div style="background:var(--surface2);border-radius:var(--radius);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:24px"><span style="font-size:14px;color:var(--text-muted)">Стоимость</span><span style="font-size:24px;font-weight:700">${price} ₸</span></div>${dateBlock}<div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">Способ оплаты</div><div style="display:flex;flex-direction:column;gap:12px"><button id="btnPayKaspi" onclick="executePayment('kaspi','${programKey}','${phone}','${clubId}')" style="width:100%;padding:16px;border-radius:var(--radius);border:none;background:#f14635;color:white;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px"><span style="font-weight:800;font-size:16px">Kaspi</span><span>Оплатить через Kaspi</span></button><button id="btnPayCard" onclick="executePayment('card','${programKey}','${phone}','${clubId}')" style="width:100%;padding:16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px"><span>Оплата картой</span></button></div><div id="payError" style="display:none;margin-top:12px;padding:12px 16px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius);color:var(--red);font-size:14px"></div></div><button onclick="renderResult()" style="margin-top:16px;width:100%;padding:12px;border:none;background:transparent;color:var(--text-muted);font-size:14px;cursor:pointer">← Вернуться к результату</button></div>`;
}

function buildReadableAnswers() {
  const readable = {};
  questions.forEach(q => {
    const key = answers[q.id];
    if (!key) return;
    const option = q.options.find(o => o.key === key);
    readable[q.question] = option ? option.label : key;
  });
  const club = answers.qClub ? (clubInfo[answers.qClub]?.name || answers.qClub) : '';
  if (club) readable['Клуб'] = club;
  if (answers.qCity) readable['Город'] = answers.qCity;
  return readable;
}

async function saveAnswersToServer(phone, clubId) {
  try {
    const aiText = Object.values(aiCache)[0] || '';
    await fetch('https://admin.herosjourney.kz/pay/api/saveQuizAnswers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        phoneNumber: phone,
        clubId,
        quizType: 'fitness-quiz',
        generatedOutput: aiText,
        ...buildReadableAnswers(),
      })
    });
  } catch(e) { console.warn('saveQuizAnswers failed:', e); }
}

async function executePayment(method, programKey, phone, clubId) {
  const btnKaspi = document.getElementById('btnPayKaspi');
  const btnCard  = document.getElementById('btnPayCard');
  const errEl    = document.getElementById('payError');
  errEl.style.display = 'none';
  btnKaspi.disabled = btnCard.disabled = true;
  const btn = method === 'kaspi' ? btnKaspi : btnCard;
  const origText = btn.innerHTML;
  btn.innerHTML = '<div style="width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite"></div>';

  try {
    let endpoint = '', body = { phoneNumber: phone, clubId };
    if (programKey === 'heros-week') {
      const d = document.getElementById('payDateInput');
      if (!d?.value) { showPayError('Выберите дату старта.'); return; }
      body.marathonDate = d.value;
      endpoint = method === 'kaspi' ? '/genereteKaspiLinkForHerosWeek' : '/registerCardTokenHerosWeek';
    } else if (programKey === 'basecamp') {
      const d = document.getElementById('payDateInput');
      if (!d?.value) { showPayError('Выберите дату старта.'); return; }
      body.type = 'build';
      endpoint = method === 'kaspi' ? '/generateKaspiLinkForGeneratedFirstStep' : '/registerCardTokenGeneratedFirstStep';
    } else if (programKey === 'first-step') {
      const s = document.getElementById('payEventSelect');
      if (!s?.value) { showPayError('Выберите дату старта.'); return; }
      body.marathonEventId = s.value;
      endpoint = method === 'kaspi' ? '/generateKaspiLinkForFirstStep' : '/registerCardTokenFirstStep';
    }
    await saveAnswersToServer(phone, clubId);
    trackEvent('payment_initiated', { method, program: programKey, club: answers.qClub });
    const resp = await fetch(PAY_API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await resp.json();
    if (!resp.ok) { showPayError(data?.message || 'Ошибка оплаты. Попробуйте ещё раз.'); return; }
    const url = data?.Data?.PaymentLink || data?.url;
    if (url) { window.location.href = 'https://herosjourney.kz/paymentlink?redirectTo=' + encodeURIComponent(url); return; }
    showPayError('Не удалось получить ссылку на оплату.');
  } catch(e) {
    showPayError('Ошибка соединения. Проверьте интернет.');
  } finally {
    btn.innerHTML = origText;
    btnKaspi.disabled = btnCard.disabled = false;
  }

  function showPayError(msg) { errEl.textContent = msg; errEl.style.display = 'block'; }
}

// ========== EVENT TRACKER ==========
const TRACKER_API = 'https://api.tracker.herosjourney.kz';
const TRACKER_KEY = 'evt_e4bb74488e8b5d42c0cd15783a4406d9';

function getDeviceId() {
  let id = localStorage.getItem('hj_device_id');
  if (!id) {
    id = 'web-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('hj_device_id', id);
  }
  return id;
}

function trackEvent(eventName, properties) {
  const body = {
    event_name: eventName,
    device_id: getDeviceId(),
    user_id: answers.qPhone || localStorage.getItem('hj_phone') || undefined,
    timestamp: Date.now(),
    event_properties: properties || {},
    context: { platform: 'web', quiz: 'fitness' }
  };
  fetch(TRACKER_API + '/v1/track', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': TRACKER_KEY },
    body: JSON.stringify(body)
  }).catch(() => {});
}

// ========== INIT ==========
trackEvent('quiz_started', { referrer: document.referrer, quiz: 'fitness' });
render();
